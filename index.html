
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AA Jino EV · Login</title>
  <!-- Bootstrap 5 + Icons + Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Poppins', sans-serif; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d6efd 0%, #28a745 100%);
      background-size: cover;
      padding: 20px;
    }
    .login-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 40px 35px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      transition: 0.3s;
    }
    .login-card:hover { transform: translateY(-5px); }
    .logo {
      font-size: 3.5rem;
      color: #28a745;
      background: #e9f5ee;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
    }
    .company-name { font-weight: 700; color: #1e3c5c; }
    .welcome { font-size: 0.9rem; color: #6c757d; }
    .btn-login { background: #28a745; border: none; font-weight: 600; }
    .btn-login:hover { background: #218838; }
    .cred-note {
      font-size: 0.8rem;
      background: #f8f9fa;
      padding: 12px;
      border-radius: 12px;
      border-left: 4px solid #28a745;
      color: #495057;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo"><i class="fas fa-charging-station"></i></div>
    <h4 class="text-center company-name">AA Jino EV Charging Station</h4>
    <p class="text-center welcome">Welcome Back · Please login</p>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="mb-3">
        <label class="form-label"><i class="fas fa-user me-2"></i>Username</label>
        <input type="text" class="form-control" id="username" value="Jino" required />
      </div>
      <div class="mb-3">
        <label class="form-label"><i class="fas fa-lock me-2"></i>Password</label>
        <input type="password" class="form-control" id="password" value="Jino" required />
      </div>
      <button type="submit" class="btn btn-login w-100 text-white py-2"><i class="fas fa-sign-in-alt me-2"></i>Login</button>
      <button type="reset" class="btn btn-outline-secondary w-100 mt-2"><i class="fas fa-undo me-2"></i>Reset</button>
    </form>

    <div class="cred-note mt-4">
      <i class="fas fa-info-circle me-1"></i> 
    </div>
    <div class="text-center mt-3 small text-muted">© 2026 AA Jino EV</div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      if (u === 'Jino' && p === 'Jino') {
        sessionStorage.setItem('loggedIn', 'true');
        sessionStorage.setItem('operator', 'Jino');
        window.location.href = 'dashboard.html';
      } else {
        alert('Invalid credentials. Use Jino/Jino.');
      }
      return false;
    }
    
    if (sessionStorage.getItem('loggedIn') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
  </html>
